<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vijay Bhesaniya | Portfolio</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When a user refreshes /admin or any sub-path, GitHub Pages serves this 404.html
      // We encode the full path into the query string and redirect to index.html
      var pathSegmentsToKeep = 1; // keep the repo name segment: /vijay_portfolio/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
